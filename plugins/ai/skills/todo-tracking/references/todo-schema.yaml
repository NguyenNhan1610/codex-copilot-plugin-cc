# TODO YAML Schema
# All TODO files must conform to this structure.
# Equivalent to a Pydantic model definition.

# --- Root ---
# metadata: TodoMetadata (required)
# tasks: list[TodoTask] (required)

# --- TodoMetadata ---
# id: str                    # e.g., "TODO-03"
# title: str                 # e.g., "Session Caching Implementation"
# source_impl: str | null    # e.g., "IMPL-03-session-caching.md"
# source_fdr: str | null     # e.g., "FDR-03-session-caching.md"
# source_adr: str | null     # e.g., "ADR-05-redis.md"
# source_tp: str | null      # e.g., "TP-03-session-caching.md"
# created: date              # e.g., 2026-04-09
# updated: datetime          # e.g., 2026-04-09T12:30:00Z

# --- TodoTask ---
# id: str                    # e.g., "T06"
# title: str                 # e.g., "Implement service layer"
# status: Status             # pending | in-progress | complete | blocked | cancelled
# priority: Priority         # P0 | P1 | P2
# track: str                 # foundation | core | testing | hardening | observability | rollout
# assignee: str | null       # e.g., "@nhan"
# ticket: str | null         # e.g., "JIRA-125" or "GH-42"
# effort: str | null         # e.g., "1.5d"
# progress: int | null       # 0-100 percentage (for in-progress tasks)
# started_at: datetime | null
# completed_at: datetime | null
# depends_on: list[str]      # task IDs, e.g., ["T04", "T05"]
# blocked_by: list[str]      # task IDs currently blocking this task
# evidence: list[Evidence]
# references: list[Reference]
# tests: list[TestCoverage]
# acceptance_criteria: list[str]  # e.g., ["EAC-1", "EAC-3"] — EAC IDs this task must satisfy
# notes: str | null

# --- Evidence ---
# file: str                  # e.g., "services/cache_service.py"
# line: str | int            # e.g., "1-78" or 42
# action: str                # created | edited | removed

# --- Reference ---
# type: str                  # impl_task | fdr_edge_case | fdr_risk | adr_decision
# ref: str                   # e.g., "T06" or "E5" or "R1"
# status: str                # handled | pending | not_applicable

# --- TestCoverage ---
# name: str                  # e.g., "test_cache_create"
# file: str                  # e.g., "tests/test_cache.py:12"
# status: str                # passing | failing | skipped | not_written

# --- AcceptanceTrace (top-level, after tasks) ---
# acceptance_trace:
#   aac: list[AcceptanceCriterionStatus]  # from ADR (empty [] if no ADR)
#   fac: list[AcceptanceCriterionStatus]  # from FDR
#   eac: list[AcceptanceCriterionStatus]  # from IMPL

# --- AcceptanceCriterionStatus ---
# id: str                    # e.g., "AAC-1" or "FAC-3" or "EAC-2"
# description: str           # human-readable description
# status: str                # not_started | in_progress | verified | failed
# verified_by: str | null    # task ID or test name that verified this
# verified_at: datetime | null

# --- Status (enum) ---
# Valid values: pending, in-progress, complete, blocked, cancelled
# Valid transitions:
#   pending → in-progress
#   pending → cancelled
#   in-progress → complete
#   in-progress → blocked
#   blocked → in-progress (when blocker resolved)
#   any → blocked (external dependency)

# --- Priority (enum) ---
# P0: Must do — blocks release
# P1: Should do — important but not blocking
# P2: Nice to have — do if time permits

# === Example ===
