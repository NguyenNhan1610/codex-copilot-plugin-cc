tasks:
  - id: T01
    title: File CRUD REST API
    status: complete
    priority: P0
    track: api
    description: |
      Create server/routes/files.ts scoped to {projectRoot}/.claude/project/ only.
      GET /api/files/tree — recursive directory listing as JSON tree.
      GET /api/files/:path(*) — read file content (raw text).
      PUT /api/files/:path(*) — write file content (create/overwrite).
      DELETE /api/files/:path(*) — delete file.
      POST /api/files/mkdir/:path(*) — create directory.
      Security: resolve all paths, verify under .claude/project/, reject "..",
      reject symlinks outside scope, max file size 1MB.

      Create server/lib/file-watcher.ts — fs.watch on .claude/project/ recursively,
      emit file_changed events to EventBus, 300ms debounce per path.
    files:
      - plugins/ai/ui/server/routes/files.ts
      - plugins/ai/ui/server/lib/file-watcher.ts
    acceptance: curl CRUD operations work, file tree reflects actual directory
    references:
      impl: IMPL-01 P3-T01
    dependencies: []
    blocks: [T02, T03, T06, T07]

  - id: T02
    title: File tree sidebar component
    status: complete
    priority: P0
    track: editor
    description: |
      Create FileTree.tsx — fetch from GET /api/files/tree, collapsible directory
      nodes with icons, file icons by extension (.md, .yaml, .svg), click opens in
      editor, right-click context menu (New file, New folder, Delete, Rename),
      auto-refresh on file_changed events, active file highlighted.
      Directory groups: adr/, fdr/, implementation_plans/, todos/, cascades/, knowledge/, traces/.
    files:
      - plugins/ai/ui/src/editor/FileTree.tsx
    acceptance: Tree shows all project files, click opens, auto-refreshes on external changes
    references:
      impl: IMPL-01 P3-T02
    dependencies: [T01]
    blocks: [T03]

  - id: T03
    title: BlockNote editor integration
    status: complete
    priority: P0
    track: editor
    description: |
      Install @blocknote/core, @blocknote/react, @blocknote/mantine (or shadcn).
      Create DocumentEditor.tsx with BlockNote instance.
      Markdown round-trip: GET file → parse to blocks, serialize blocks → PUT file.
      Auto-save: 2s debounce with dirty indicator.
      Manual save: Ctrl+S / Cmd+S.
      Toolbar: headings, bold, italic, code, lists, links, tables.
      Read-only mode for cascade records (REC-*.md).
    files:
      - plugins/ai/ui/src/editor/DocumentEditor.tsx
    acceptance: Open ADR markdown, edit in BlockNote, save, re-open — round-trips correctly
    references:
      impl: IMPL-01 P3-T03
    dependencies: [T01, T02]
    blocks: [T04, T05, T06, T07]

  - id: T04
    title: Custom block — YAML frontmatter
    status: complete
    priority: P1
    track: blocks
    description: |
      Create FrontmatterBlock.tsx — detect YAML frontmatter (--- delimited) at file start.
      Render as structured form: key-value pairs as label+input, status as dropdown
      (Proposed/Accepted/Deprecated), date fields as date picker, tags as chip input.
      Serialize back to YAML --- block on save.
      Non-editable keys (name, date) shown read-only.
    files:
      - plugins/ai/ui/src/editor/blocks/FrontmatterBlock.tsx
    acceptance: FDR/ADR frontmatter renders as form, edits serialize correctly
    references:
      impl: IMPL-01 P3-T04
    dependencies: [T03]
    blocks: []

  - id: T05
    title: Custom block — Mermaid diagrams
    status: complete
    priority: P1
    track: blocks
    description: |
      Create MermaidBlock.tsx — detect fenced ```mermaid code blocks.
      Split view: code editor (left) + live preview (right).
      Client-side rendering via mermaid npm package (no mmdc needed).
      Syntax validation: red border + error message on invalid syntax.
      Copy SVG button. Export button → server-side /ai:mermaid render for high-quality output.
    files:
