      appends events to state array, clear() to reset. Cleanup on unmount.
    files:
      - plugins/ai/ui/src/hooks/useEventStream.ts
    acceptance: Hook connects, reconnects after restart, events accumulate in state
    references:
      impl: IMPL-01 P2-T02
    dependencies: [T01]
    blocks: [T03]

  - id: T03
    title: ChatFeed container + EventRouter
    status: complete
    priority: P0
    track: frontend
    description: |
      ChatFeed.tsx: scrollable container, maps events to widgets via EventRouter,
      auto-scroll with scroll lock (disable on user scroll-up, re-enable on scroll-to-bottom),
      connection status indicator, empty state message.
      EventRouter.tsx: switch on event.type + event.tool to select widget component.
      Routing: user_prompt→UserPrompt, tool+Bash→BashCommand, tool+Edit→CodeDiff,
      tool+Write→FileCreate, tool+Read→FileRead, tool+Grep/Glob→SearchResult,
      tool+Agent→AgentStart, agent_stop→AgentResult, job_update→JobStatus,
      stop_blocked→LintResult/ReviewResult, session_*→SessionEvent, fallback→GenericEvent.
    files:
      - plugins/ai/ui/src/feed/ChatFeed.tsx
      - plugins/ai/ui/src/feed/EventRouter.tsx
    acceptance: Events render as correct widget types in scrollable feed
    references:
      impl: IMPL-01 P2-T03
    dependencies: [T01, T02]
    blocks: [T04, T05, T06, T07, T08, T09]

